    <h1>Roadmap TPI</h1>

    <!-- progress bar -->
    <div class="barra-progreso-wrapper">
        <div class="barra-progreso-label">
            <span>Progreso de la carrera</span>
            <strong id="barra-pct">0%</strong>
        </div>
        <div class="barra-progreso-track">
            <div class="barra-progreso-fill" id="barra-fill"></div>
        </div>
    </div>

    <!-- stats -->
    <div class="panel-stats">
        <div class="stat-box">

            <span class="valor" id="mat-aprobadas">0</span>
        </div>
        <div class="stat-box">
            <span class="titulo">Restantes</span>
            <span class="valor" id="mat-restantes">0</span>
        </div>
        <div class="stat-box">
            <span class="titulo">Total</span>
            <span class="valor" id="mat-total">0</span>
        </div>
        <div class="stat-box">
            <span class="titulo">Créditos</span>
            <span class="valor" id="cred-total">0</span>
        </div>
    </div>

    <!-- credits by group -->
    <div class="panel-creditos">
        <span class="grupo-tag">CI: <span id="cred-CI">0</span></span>
        <span class="grupo-tag">CO: <span id="cred-CO">0</span></span>
        <span class="grupo-tag">CA: <span id="cred-CA">0</span></span>
        <span class="grupo-tag">P10CO: <span id="cred-P10CO">0</span></span>
        <span class="grupo-tag">Otros: <span id="cred-Otros">0</span></span>
    </div>

    <!-- filters -->
    <div class="panel-filtros">
        <select id="filtro-grupo" onchange="aplicarFiltros()">
            <option value="Todos">Todos los Grupos</option>
            <option value="CI">Ciclo Introductorio (CI)</option>
            <option value="CO">Cursos Obligatorios (CO)</option>
            <option value="CA">Cursos Avanzados (CA)</option>
            <option value="P10CO">Complementarias (P10CO)</option>
            <option value="Otros">Otros Requisitos</option>
        </select>
        <select id="filtro-estado" onchange="aplicarFiltros()">
            <option value="Todos">Todos los Estados</option>
            <option value="aprobada">Aprobadas</option>
            <option value="habilitada">Habilitadas</option>
            <option value="bloqueada">Bloqueadas</option>
            <option value="en-curso">En curso</option>
        </select>
        <button class="btn-reiniciar" onclick="reiniciarRoadmap()">🔄 Reiniciar</button>
    </div>

    <!-- simulation panel -->
    <div class="panel-simulacion" id="panel-simulacion">
        <div class="panel-simulacion-label">📖 Simulando cuatrimestre — <strong id="sim-cantidad">0</strong> materias en curso</div>
        <div class="simulacion-stats">
            <div class="sim-stat">Créditos nuevos: <span id="sim-creditos">+0</span></div>
            <div class="sim-stat">Desbloquearía: <span id="sim-desbloquea">0</span> materias</div>
        </div>
        <button class="btn-sim-limpiar" onclick="limpiarSimulacion()">✕ Limpiar simulación</button>
    </div>
